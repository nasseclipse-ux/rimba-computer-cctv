[build]
  command = "npm run build"
  functions = "functions"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"
  environment = { NODE_VERSION = "18" }

[context.deploy-preview]
  command = "npm run build"
  environment = { NODE_VERSION = "18" }

[context.branch-deploy]
  command = "npm run build"
  environment = { NODE_VERSION = "18" }
